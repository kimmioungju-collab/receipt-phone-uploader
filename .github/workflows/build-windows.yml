name: Build Windows EXE (slim)

on:
  push:
    branches: [windows-build]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UPX
        run: choco install upx -y --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 Pillow qrcode pyinstaller

      - name: Build EXE (slim, UPX-compressed)
        run: pyinstaller build.spec --clean --noconfirm

      - name: Show file size
        shell: pwsh
        run: |
          Get-Item dist/*.exe | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: receipt-inserter-windows-slim
          path: dist/*.exe
          if-no-files-found: error
