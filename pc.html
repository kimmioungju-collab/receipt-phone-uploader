<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구매영수증 PC 수신기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Malgun Gothic", "Noto Sans KR", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      padding: 28px 32px;
      border-radius: 14px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.25);
    }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .header .desc { font-size: 14px; opacity: 0.9; }
    .header .author { font-size: 12px; opacity: 0.75; margin-top: 8px; }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }
    .card h2 {
      font-size: 16px;
      margin-bottom: 14px;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .code-input-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }
    .code-input {
      flex: 1;
      background: #0f172a;
      border: 2px solid #334155;
      color: #f1f5f9;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 12px;
      text-align: center;
      padding: 14px 20px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .code-input:focus { border-color: #3b82f6; }
    .code-input::placeholder { color: #475569; letter-spacing: 6px; }

    .fetch-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .fetch-btn:hover:not(:disabled) { background: #1d4ed8; }
    .fetch-btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }

    .status-bar {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status-bar.show { display: block; }
    .status-bar.info { background: #1e3a8a; color: #bfdbfe; }
    .status-bar.error { background: #7f1d1d; color: #fecaca; }
    .status-bar.success { background: #14532d; color: #bbf7d0; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar-btn {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar-btn:hover { background: #475569; border-color: #64748b; }
    .toolbar-btn.primary { background: #16a34a; border-color: #16a34a; color: white; }
    .toolbar-btn.primary:hover { background: #15803d; }
    .toolbar-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .meta {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .meta b { color: #cbd5e1; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .photo-card {
      position: relative;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .photo-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    .photo-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .photo-card .num {
      position: absolute; top: 8px; left: 8px;
      background: rgba(15,23,42,0.85);
      color: white;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .photo-card .dl-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(37,99,235,0.9);
      color: white;
      border: none;
      width: 30px; height: 30px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-card .dl-btn:hover { background: #2563eb; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
      font-size: 14px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 30px;
    }
    .modal.show { display: flex; }
    .modal img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }
    .modal-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖥️ 구매영수증 PC 수신기</h1>
      <div class="desc">📱 폰에서 보낸 6자리 코드를 입력해 사진을 받으세요</div>
      <div class="author">제작 · 평택소방서 김명주</div>
    </div>

    <div class="card">
      <h2>📱 폰에서 받기</h2>
      <div class="code-input-row">
        <input type="text" id="code" class="code-input"
               maxlength="6" inputmode="numeric" pattern="[0-9]*"
               placeholder="------" autocomplete="off">
        <button id="fetch-btn" class="fetch-btn" onclick="fetchCode()">📥 가져오기</button>
      </div>
      <div id="status" class="status-bar"></div>
    </div>

    <div class="card">
      <h2>📸 받은 사진</h2>
      <div id="meta" class="meta" style="display:none;">
        <span>코드: <b id="m-code">-</b></span>
        <span>장수: <b id="m-count">0</b>장</span>
        <span>업로드: <b id="m-time">-</b></span>
      </div>
      <div class="toolbar" id="toolbar" style="display:none;">
        <button class="toolbar-btn primary" onclick="downloadAllZip()">📦 ZIP으로 일괄 다운로드</button>
        <button class="toolbar-btn" onclick="downloadAllSeparate()">📥 한 장씩 다운로드</button>
        <button class="toolbar-btn" onclick="copyAllUrls()">🔗 링크 복사</button>
        <button class="toolbar-btn" onclick="clearAll()">🗑️ 비우기</button>
      </div>
      <div id="grid" class="photo-grid">
        <div class="empty" id="empty" style="grid-column: 1 / -1;">
          <div class="empty-icon">📭</div>
          위에 6자리 코드를 입력하세요
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal" onclick="closeModal()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modal-img" src="" alt="">
  </div>

  <script>
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwKsnObp56VgdoBf4FFQw9lVPimnvfNFS2HXDbVd6iQH7xXDeEeYheTZn5r_RgN2_2LaA/exec';
    const GAS_TOKEN = 'receipt-secret-2026';
    let currentPhotos = [];
    let currentCode = '';

    const codeInput = document.getElementById('code');
    codeInput.addEventListener('input', e => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
    });
    codeInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchCode();
    });
    codeInput.focus();

    function setStatus(msg, type='info') {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.className = 'status-bar show ' + type;
    }
    function clearStatus() {
      document.getElementById('status').className = 'status-bar';
    }

    async function fetchCode() {
      const code = codeInput.value.trim();
      if (code.length !== 6) {
        setStatus('6자리 숫자 코드를 입력하세요.', 'error');
        return;
      }
      const btn = document.getElementById('fetch-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 조회중...';
      setStatus('서버에서 사진 목록 가져오는 중...', 'info');

      try {
        const url = `${GAS_ENDPOINT}?token=${encodeURIComponent(GAS_TOKEN)}&action=fetch&code=${encodeURIComponent(code)}`;
        const resp = await fetch(url, { redirect: 'follow' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || '조회 실패');

        const photos = data.photos || data.files || [];
        if (!photos.length) throw new Error('해당 코드에 사진이 없습니다.');

        currentPhotos = photos;
        currentCode = code;
        renderPhotos(photos, data);
        setStatus(`✅ ${photos.length}장 가져옴`, 'success');
      } catch (e) {
        console.error(e);
        setStatus('❌ ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '📥 가져오기';
      }
    }

    function buildImgUrl(p) {
      // GAS가 url, viewUrl, thumbnailUrl, fileId 중 어떤 것을 줄지 모르니 우선순위
      if (p.url) return p.url;
      if (p.viewUrl) return p.viewUrl;
      if (p.thumbnailUrl) return p.thumbnailUrl;
      if (p.fileId) return `https://drive.google.com/uc?export=view&id=${p.fileId}`;
      return '';
    }
    function buildDownloadUrl(p) {
      if (p.downloadUrl) return p.downloadUrl;
      if (p.fileId) return `https://drive.google.com/uc?export=download&id=${p.fileId}`;
      return buildImgUrl(p);
    }

    function renderPhotos(photos, data) {
      const grid = document.getElementById('grid');
      const meta = document.getElementById('meta');
      const tools = document.getElementById('toolbar');
      grid.innerHTML = '';
      meta.style.display = 'flex';
      tools.style.display = 'flex';
      document.getElementById('m-code').textContent = currentCode;
      document.getElementById('m-count').textContent = photos.length;
      document.getElementById('m-time').textContent =
        data.uploadedAt || data.createdAt || data.timestamp || '-';

      photos.forEach((p, i) => {
        const slot = p.slot || (i + 1);
        const imgUrl = buildImgUrl(p);
        const dlUrl = buildDownloadUrl(p);
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.innerHTML = `
          <img src="${imgUrl}" alt="${slot}" loading="lazy"
               onerror="this.style.background='#1e293b';this.alt='이미지 로드 실패'">
          <div class="num">${slot}</div>
          <button class="dl-btn" onclick="event.stopPropagation();downloadOne('${dlUrl}', ${slot}, '${(p.originalName||'photo.jpg').replace(/'/g,"\\'")}')">⬇</button>
        `;
        card.addEventListener('click', () => openModal(imgUrl));
        grid.appendChild(card);
      });
    }

    function openModal(url) {
      document.getElementById('modal-img').src = url;
      document.getElementById('modal').classList.add('show');
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    async function downloadOne(url, slot, name) {
      try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name || `photo_${slot}.jpg`;
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (e) {
        // 실패 시 새 탭으로 열기
        window.open(url, '_blank');
      }
    }

    async function downloadAllSeparate() {
      for (let i = 0; i < currentPhotos.length; i++) {
        const p = currentPhotos[i];
        await downloadOne(buildDownloadUrl(p), p.slot || i+1, p.originalName);
        await new Promise(r => setTimeout(r, 250));
      }
      setStatus(`✅ ${currentPhotos.length}장 다운로드 시작`, 'success');
    }

    async function downloadAllZip() {
      if (!currentPhotos.length) return;
      setStatus('ZIP 생성중... 사진을 받아오는 중입니다.', 'info');
      try {
        const zip = new JSZip();
        const folder = zip.folder(`receipt_${currentCode}`);
        let ok = 0, fail = 0;
        for (let i = 0; i < currentPhotos.length; i++) {
          const p = currentPhotos[i];
          const url = buildDownloadUrl(p);
          const slot = p.slot || (i + 1);
          const name = p.originalName || `photo_${String(slot).padStart(2,'0')}.jpg`;
          try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const blob = await resp.blob();
            folder.file(name, blob);
            ok++;
            setStatus(`ZIP 생성중... ${ok}/${currentPhotos.length}`, 'info');
          } catch (err) {
            fail++;
            console.error('failed', name, err);
          }
        }
        const content = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `receipt_${currentCode}.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus(`✅ ZIP 다운로드 완료 (성공 ${ok}장${fail?`, 실패 ${fail}장`:''})`, 'success');
      } catch (e) {
        setStatus('❌ ZIP 생성 실패: ' + e.message, 'error');
      }
    }

    function copyAllUrls() {
      const text = currentPhotos.map((p,i) => {
        const slot = p.slot || (i+1);
        return `${slot}. ${buildImgUrl(p)}`;
      }).join('\n');
      navigator.clipboard.writeText(text).then(() => {
        setStatus('✅ 링크가 클립보드에 복사되었습니다', 'success');
      }).catch(() => setStatus('❌ 복사 실패', 'error'));
    }

    function clearAll() {
      currentPhotos = [];
      currentCode = '';
      codeInput.value = '';
      document.getElementById('grid').innerHTML =
        `<div class="empty" style="grid-column: 1 / -1;">
           <div class="empty-icon">📭</div>위에 6자리 코드를 입력하세요
         </div>`;
      document.getElementById('meta').style.display = 'none';
      document.getElementById('toolbar').style.display = 'none';
      clearStatus();
      codeInput.focus();
    }
  </script>
</body>
</html>
