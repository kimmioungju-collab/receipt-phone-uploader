<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <title>구매영수증 사진 업로드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Malgun Gothic", "Noto Sans KR", sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 16px;
      font-size: 16px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .header {
      background: #2563eb;
      color: white;
      padding: 18px 16px;
      border-radius: 12px 12px 0 0;
      text-align: center;
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header .author { font-size: 11px; opacity: 0.85; margin-top: 4px; }
    .content {
      background: white;
      padding: 16px;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .info-text {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin: 4px 0 14px;
      line-height: 1.5;
    }
    .counter {
      text-align: center;
      font-size: 13px;
      color: #475569;
      font-weight: 500;
      margin-bottom: 12px;
      padding: 8px;
      background: #f1f5f9;
      border-radius: 6px;
    }
    .counter b { color: #2563eb; }
    
    .multi-btn {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .multi-btn:active { background: #1d4ed8; }
    
    .add-btn {
      width: 100%;
      padding: 12px;
      background: #f0fdf4;
      color: #166534;
      border: 1.5px solid #86efac;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .add-btn:active { background: #d1fae5; }
    .add-btn:disabled {
      background: #f1f5f9;
      color: #94a3b8;
      border-color: #e2e8f0;
      cursor: not-allowed;
    }
    
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .photo-card {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: white;
      overflow: hidden;
      transition: all 0.2s;
    }
    .photo-card.uploading { border-color: #2563eb; }
    .photo-card.success { border: 2px solid #16a34a; }
    .photo-card.error { border: 2px solid #dc2626; }
    
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-card .num {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 11px;
      font-weight: 600;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-card .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(220,38,38,0.85);
      color: white;
      font-size: 12px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }
    .photo-card .progress {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      background: rgba(0,0,0,0.1);
    }
    .photo-card .progress-bar {
      height: 100%;
      background: #2563eb;
      width: 0%;
      transition: width 0.3s;
    }
    .photo-card .status {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }
    .photo-card.success .status { background: #16a34a; }
    .photo-card.error .status { background: #dc2626; }
    
    input[type=file] { display: none; }
    
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:active { background: #1d4ed8; }
    .submit-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    
    .result-box {
      display: none;
      background: #f0fdf4;
      border: 2px solid #16a34a;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      text-align: center;
    }
    .result-box.show { display: block; }
    .result-box .success-mark { font-size: 32px; margin-bottom: 8px; }
    .result-box .label { font-size: 13px; color: #166534; margin-bottom: 6px; }
    .result-box .code {
      font-size: 38px;
      font-weight: bold;
      color: #166534;
      letter-spacing: 4px;
      font-family: 'Courier New', monospace;
      padding: 8px 0;
      user-select: all;
      -webkit-user-select: all;
    }
    .result-box .hint {
      font-size: 12px;
      color: #15803d;
      margin-top: 8px;
      line-height: 1.5;
    }
    .copy-btn {
      background: white;
      color: #166534;
      border: 1px solid #86efac;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 10px;
      cursor: pointer;
    }
    .copy-btn:active { background: #ecfdf5; }
    
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }
    
    .footer {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 16px;
    }
    
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #94a3b8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📷 사진 업로드</h1>
      <div class="author">제작 · 평택소방서 김명주</div>
    </div>
    <div class="content">
      <p class="info-text">
        사진을 1~20장까지 업로드할 수 있습니다.<br>
        한 번에 여러 장 또는 한 장씩 추가하세요.
      </p>
      
      <button class="multi-btn" onclick="document.getElementById('multi-file').click()">
        📂 사진 여러 장 선택
      </button>
      <input type="file" id="multi-file" accept="image/*" multiple>
      
      <button id="add-btn" class="add-btn" onclick="document.getElementById('single-file').click()">
        ➕ 한 장 추가
      </button>
      <input type="file" id="single-file" accept="image/*">
      
      <div class="counter">
        선택된 사진: <b id="counter">0</b> / 20장
      </div>
      
      <div id="photo-grid" class="photo-grid">
        <div class="empty-state" id="empty-state" style="grid-column: 1 / -1;">
          아직 선택된 사진이 없습니다
        </div>
      </div>
      
      <button id="submit-btn" class="submit-btn" disabled onclick="submitAll()">
        사진을 1장 이상 선택하세요
      </button>
      
      <div id="result" class="result-box">
        <div class="success-mark">✅</div>
        <div class="label">PC에 입력할 코드</div>
        <div class="code" id="code-display">-------</div>
        <button class="copy-btn" onclick="copyCode()">복사</button>
        <div class="hint">
          이 코드를 PC 프로그램의<br>
          <b>"📱 폰에서 받기"</b> 화면에 입력하세요.<br>
          <span style="color:#16a34a;">※ Google Drive에 영구 저장됨</span>
        </div>
      </div>
    </div>
    <div class="footer">
      Google Drive에 영구 보관됩니다.
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <script>
    const MAX_PHOTOS = 20;
    const photos = [];
    let nextId = 1;

    // ===== Google Apps Script 백엔드 설정 =====
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwKsnObp56VgdoBf4FFQw9lVPimnvfNFS2HXDbVd6iQH7xXDeEeYheTZn5r_RgN2_2LaA/exec';
    const GAS_TOKEN = 'receipt-secret-2026';

    function generateCode() {
      // 6자리 랜덤 숫자 (100000 ~ 999999)
      return String(Math.floor(100000 + Math.random() * 900000));
    }
    let SESSION_CODE = generateCode();

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result || '';
          const comma = result.indexOf(',');
          resolve(comma >= 0 ? result.slice(comma + 1) : result);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    
    document.getElementById('multi-file').addEventListener('change', e => {
      addFiles(Array.from(e.target.files));
      e.target.value = '';
    });
    
    document.getElementById('single-file').addEventListener('change', e => {
      addFiles(Array.from(e.target.files));
      e.target.value = '';
    });
    
    function addFiles(files) {
      const remaining = MAX_PHOTOS - photos.length;
      if (remaining <= 0) {
        showToast(`이미 최대 ${MAX_PHOTOS}장 선택됨`, 'error');
        return;
      }
      if (files.length > remaining) {
        showToast(`${files.length}장 중 ${remaining}장만 추가됨`, '');
        files = files.slice(0, remaining);
      }
      
      files.forEach(file => {
        const photo = { id: nextId++, file, dataUrl: null };
        photos.push(photo);
        const reader = new FileReader();
        reader.onload = e => {
          photo.dataUrl = e.target.result;
          renderPhotos();
        };
        reader.readAsDataURL(file);
      });
      renderPhotos();
    }
    
    function removePhoto(id) {
      const idx = photos.findIndex(p => p.id === id);
      if (idx >= 0) {
        photos.splice(idx, 1);
        renderPhotos();
      }
    }
    
    function renderPhotos() {
      const grid = document.getElementById('photo-grid');
      document.getElementById('counter').textContent = photos.length;
      
      if (photos.length === 0) {
        grid.innerHTML = '<div class="empty-state" id="empty-state" style="grid-column: 1 / -1;">아직 선택된 사진이 없습니다</div>';
        updateSubmitBtn();
        updateAddBtn();
        return;
      }
      
      grid.innerHTML = '';
      photos.forEach((photo, idx) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.id = `card-${photo.id}`;
        card.innerHTML = `
          ${photo.dataUrl ? `<img src="${photo.dataUrl}" alt="">` : ''}
          <div class="num">${idx + 1}</div>
          <button class="remove" onclick="removePhoto(${photo.id})">✕</button>
        `;
        grid.appendChild(card);
      });
      updateSubmitBtn();
      updateAddBtn();
    }
    
    function updateSubmitBtn() {
      const btn = document.getElementById('submit-btn');
      if (photos.length === 0) {
        btn.disabled = true;
        btn.textContent = "사진을 1장 이상 선택하세요";
      } else {
        btn.disabled = false;
        btn.textContent = `📤 PC로 보내기 (${photos.length}장)`;
      }
    }
    
    function updateAddBtn() {
      const btn = document.getElementById('add-btn');
      btn.disabled = photos.length >= MAX_PHOTOS;
      btn.textContent = photos.length >= MAX_PHOTOS
        ? "⛔ 최대 20장까지" : "➕ 한 장 추가";
    }
    
    async function submitAll() {
      if (photos.length === 0) return;
      
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = "업로드 중...";
      document.getElementById('add-btn').disabled = true;
      document.querySelector('.multi-btn').disabled = true;
      document.querySelectorAll('.photo-card .remove').forEach(b => b.disabled = true);
      
      try {
        const code = SESSION_CODE;
        const photoEntries = [];
        for (let i = 0; i < photos.length; i++) {
          const photo = photos[i];
          markUploading(photo.id);
          const slot = i + 1;
          const result = await uploadFile(
            photo.file,
            code,
            slot,
            pct => updateProgress(photo.id, pct)
          );
          photoEntries.push({
            slot: slot,
            fileId: result.fileId,
            url: result.url,
            originalName: photo.file.name,
          });
          markSuccess(photo.id);
        }

        // manifest 생성 (백엔드가 폴더에 manifest.json 작성)
        await finalizeUpload(code, photoEntries);
        showResult(code);
      } catch (e) {
        console.error(e);
        showToast(`업로드 실패: ${e.message}`, 'error');
        btn.disabled = false;
        btn.textContent = "다시 시도";
      }
    }

    async function uploadFile(file, code, slot, onProgress) {
      // 진행률 시뮬레이션 (base64 변환 단계)
      if (onProgress) onProgress(15);
      const base64 = await fileToBase64(file);
      if (onProgress) onProgress(45);

      const payload = {
        token: GAS_TOKEN,
        action: 'upload',
        code: code,
        slot: slot,
        filename: file.name || `photo_${slot}.jpg`,
        mimeType: file.type || 'image/jpeg',
        base64: base64,
      };

      // text/plain → CORS preflight 회피 (Apps Script는 e.postData.contents로 받음)
      const resp = await fetch(GAS_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
        redirect: 'follow',
      });
      if (onProgress) onProgress(95);

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error || '서버 응답 오류');
      if (onProgress) onProgress(100);
      return { fileId: data.fileId, url: data.url };
    }

    async function finalizeUpload(code, photoEntries) {
      const payload = {
        token: GAS_TOKEN,
        action: 'finalize',
        code: code,
        photos: photoEntries,
      };
      const resp = await fetch(GAS_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
        redirect: 'follow',
      });
      if (!resp.ok) throw new Error(`finalize HTTP ${resp.status}`);
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error || 'finalize 실패');
      return data;
    }
    
    function markUploading(id) {
      const card = document.getElementById(`card-${id}`);
      if (!card) return;
      card.classList.add('uploading');
      if (!card.querySelector('.progress')) {
        const bar = document.createElement('div');
        bar.className = 'progress';
        bar.innerHTML = `<div class="progress-bar" id="bar-${id}"></div>`;
        card.appendChild(bar);
      }
    }
    
    function updateProgress(id, pct) {
      const bar = document.getElementById(`bar-${id}`);
      if (bar) bar.style.width = pct + '%';
    }
    
    function markSuccess(id) {
      const card = document.getElementById(`card-${id}`);
      if (!card) return;
      card.classList.remove('uploading');
      card.classList.add('success');
      const bar = card.querySelector('.progress');
      if (bar) bar.remove();
      if (!card.querySelector('.status')) {
        const s = document.createElement('div');
        s.className = 'status';
        s.textContent = '✓';
        card.appendChild(s);
      }
    }
    
    function showResult(code) {
      document.getElementById('code-display').textContent = code;
      document.getElementById('result').classList.add('show');
      document.getElementById('submit-btn').style.display = 'none';
      document.getElementById('result').scrollIntoView({behavior: 'smooth'});
      showToast(`${photos.length}장 업로드 완료!`, 'success');
    }
    
    function copyCode() {
      const code = document.getElementById('code-display').textContent;
      const tmp = document.createElement('input');
      tmp.value = code;
      document.body.appendChild(tmp);
      tmp.select();
      tmp.setSelectionRange(0, 99999);
      try {
        document.execCommand('copy');
        if (navigator.clipboard) navigator.clipboard.writeText(code);
        showToast('코드가 복사되었습니다', 'success');
      } catch (e) {
        showToast('복사 실패 - 직접 입력하세요', 'error');
      }
      document.body.removeChild(tmp);
    }
    
    let toastTimer = null;
    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        t.className = 'toast ' + type;
      }, 2500);
    }
  </script>
</body>
</html>
