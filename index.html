<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <title>구매영수증 사진 업로드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Malgun Gothic", "Noto Sans KR", sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 16px;
      font-size: 16px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .header {
      background: #2563eb;
      color: white;
      padding: 18px 16px;
      border-radius: 12px 12px 0 0;
      text-align: center;
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header .author { font-size: 11px; opacity: 0.85; margin-top: 4px; }
    .content {
      background: white;
      padding: 16px;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .info-text {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin: 4px 0 14px;
      line-height: 1.5;
    }
    .counter {
      text-align: center;
      font-size: 13px;
      color: #475569;
      font-weight: 500;
      margin-bottom: 12px;
      padding: 8px;
      background: #f1f5f9;
      border-radius: 6px;
    }
    .counter b { color: #2563eb; }
    
    .multi-btn {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .multi-btn:active { background: #1d4ed8; }
    
    .add-btn {
      width: 100%;
      padding: 12px;
      background: #f0fdf4;
      color: #166534;
      border: 1.5px solid #86efac;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .add-btn:active { background: #d1fae5; }
    .add-btn:disabled {
      background: #f1f5f9;
      color: #94a3b8;
      border-color: #e2e8f0;
      cursor: not-allowed;
    }
    
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .photo-card {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: white;
      overflow: hidden;
      transition: all 0.2s;
    }
    .photo-card.uploading { border-color: #2563eb; }
    .photo-card.success { border: 2px solid #16a34a; }
    .photo-card.error { border: 2px solid #dc2626; }
    
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-card .num {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 11px;
      font-weight: 600;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-card .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(220,38,38,0.85);
      color: white;
      font-size: 12px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }
    .photo-card .progress {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      background: rgba(0,0,0,0.1);
    }
    .photo-card .progress-bar {
      height: 100%;
      background: #2563eb;
      width: 0%;
      transition: width 0.3s;
    }
    .photo-card .status {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }
    .photo-card.success .status { background: #16a34a; }
    .photo-card.error .status { background: #dc2626; }
    
    input[type=file] { display: none; }
    
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:active { background: #1d4ed8; }
    .submit-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    
    .result-box {
      display: none;
      background: #f0fdf4;
      border: 2px solid #16a34a;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      text-align: center;
    }
    .result-box.show { display: block; }
    .result-box .success-mark { font-size: 32px; margin-bottom: 8px; }
    .result-box .label { font-size: 13px; color: #166534; margin-bottom: 6px; }
    .result-box .code {
      font-size: 38px;
      font-weight: bold;
      color: #166534;
      letter-spacing: 4px;
      font-family: 'Courier New', monospace;
      padding: 8px 0;
      user-select: all;
      -webkit-user-select: all;
    }
    .result-box .hint {
      font-size: 12px;
      color: #15803d;
      margin-top: 8px;
      line-height: 1.5;
    }
    .copy-btn {
      background: white;
      color: #166534;
      border: 1px solid #86efac;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 10px;
      cursor: pointer;
    }
    .copy-btn:active { background: #ecfdf5; }
    
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }
    
    .footer {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 16px;
    }
    
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #94a3b8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📷 사진 업로드</h1>
      <div class="author">제작 · 곽명주, 강상현, 이규태, 노규형, 김재우</div>
    </div>
    <div class="content">
      <p class="info-text">
        사진을 1~20장까지 업로드할 수 있습니다.<br>
        업로드 시 자동으로 최적 크기로 압축됩니다.
      </p>
      
      <button class="multi-btn" onclick="document.getElementById('multi-file').click()">
        📂 사진 여러 장 선택
      </button>
      <input type="file" id="multi-file" accept="image/*" multiple>
      
      <button id="add-btn" class="add-btn" onclick="document.getElementById('single-file').click()">
        ➕ 한 장 추가
      </button>
      <input type="file" id="single-file" accept="image/*">
      
      <div class="counter">
        선택된 사진: <b id="counter">0</b> / 20장
      </div>
      
      <div id="photo-grid" class="photo-grid">
        <div class="empty-state" id="empty-state" style="grid-column: 1 / -1;">
          아직 선택된 사진이 없습니다
        </div>
      </div>
      
      <button id="submit-btn" class="submit-btn" disabled onclick="submitAll()">
        사진을 1장 이상 선택하세요
      </button>
      
      <div id="result" class="result-box">
        <div class="success-mark">✅</div>
        <div class="label">PC에 입력할 코드</div>
        <div class="code" id="code-display">-------</div>
        <button class="copy-btn" onclick="copyCode()">복사</button>
        <div class="hint">
          이 코드를 PC 프로그램의<br>
          <b>"📱 폰에서 받기"</b> 화면에 입력하세요.<br>
          <span style="color:#dc2626;">※ 60분 안에 입력해야 합니다.</span>
        </div>
      </div>
    </div>
    <div class="footer">
      tmpfiles.org를 통해 60분간 임시 보관됩니다.
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <script>
    const MAX_PHOTOS = 20;
    const photos = [];
    let nextId = 1;
    
    document.getElementById('multi-file').addEventListener('change', e => {
      addFiles(Array.from(e.target.files));
      e.target.value = '';
    });
    
    document.getElementById('single-file').addEventListener('change', e => {
      addFiles(Array.from(e.target.files));
      e.target.value = '';
    });
    
    function addFiles(files) {
      const remaining = MAX_PHOTOS - photos.length;
      if (remaining <= 0) {
        showToast(`이미 최대 ${MAX_PHOTOS}장 선택됨`, 'error');
        return;
      }
      if (files.length > remaining) {
        showToast(`${files.length}장 중 ${remaining}장만 추가됨`, '');
        files = files.slice(0, remaining);
      }
      
      files.forEach(file => {
        const photo = { id: nextId++, file, dataUrl: null };
        photos.push(photo);
        const reader = new FileReader();
        reader.onload = e => {
          photo.dataUrl = e.target.result;
          renderPhotos();
        };
        reader.readAsDataURL(file);
      });
      renderPhotos();
    }
    
    function removePhoto(id) {
      const idx = photos.findIndex(p => p.id === id);
      if (idx >= 0) {
        photos.splice(idx, 1);
        renderPhotos();
      }
    }
    
    function renderPhotos() {
      const grid = document.getElementById('photo-grid');
      document.getElementById('counter').textContent = photos.length;
      
      if (photos.length === 0) {
        grid.innerHTML = '<div class="empty-state" id="empty-state" style="grid-column: 1 / -1;">아직 선택된 사진이 없습니다</div>';
        updateSubmitBtn();
        updateAddBtn();
        return;
      }
      
      grid.innerHTML = '';
      photos.forEach((photo, idx) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.id = `card-${photo.id}`;
        card.innerHTML = `
          ${photo.dataUrl ? `<img src="${photo.dataUrl}" alt="">` : ''}
          <div class="num">${idx + 1}</div>
          <button class="remove" onclick="removePhoto(${photo.id})">✕</button>
        `;
        grid.appendChild(card);
      });
      updateSubmitBtn();
      updateAddBtn();
    }
    
    function updateSubmitBtn() {
      const btn = document.getElementById('submit-btn');
      if (photos.length === 0) {
        btn.disabled = true;
        btn.textContent = "사진을 1장 이상 선택하세요";
      } else {
        btn.disabled = false;
        btn.textContent = `📤 PC로 보내기 (${photos.length}장)`;
      }
    }
    
    function updateAddBtn() {
      const btn = document.getElementById('add-btn');
      btn.disabled = photos.length >= MAX_PHOTOS;
      btn.textContent = photos.length >= MAX_PHOTOS
        ? "⛔ 최대 20장까지" : "➕ 한 장 추가";
    }
    
    /**
     * 하이브리드 병렬 처리:
     * - 압축은 순차 (CPU/메모리 안전)
     * - 업로드는 동시 최대 3개 (tmpfiles.org 부담 X, 네트워크 효율 ↑)
     * - Producer(압축) → Queue → Workers(업로드 3개) 파이프라인
     */
    const UPLOAD_CONCURRENCY = 3;
    
    async function submitAll() {
      if (photos.length === 0) return;
      
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = "처리 중...";
      document.getElementById('add-btn').disabled = true;
      document.querySelector('.multi-btn').disabled = true;
      document.querySelectorAll('.photo-card .remove').forEach(b => b.disabled = true);
      
      const total = photos.length;
      let compressedCount = 0;
      let uploadedCount = 0;
      
      const updateBtnText = () => {
        if (uploadedCount === total) {
          btn.textContent = "마지막 단계...";
        } else if (compressedCount < total) {
          btn.textContent = `압축 ${compressedCount}/${total} · 업로드 ${uploadedCount}/${total}`;
        } else {
          btn.textContent = `업로드 ${uploadedCount}/${total}`;
        }
      };
      
      try {
        const urls = new Array(total);  // slot 순서 유지
        const uploadQueue = [];
        let producerDone = false;
        let firstError = null;
        
        // === Producer: 압축 (순차) ===
        const producer = (async () => {
          for (let i = 0; i < total; i++) {
            if (firstError) break;
            const photo = photos[i];
            try {
              markCompressing(photo.id);
              const compressedFile = await compressImage(photo.file);
              compressedCount++;
              updateBtnText();
              uploadQueue.push({
                slotIdx: i,
                photoId: photo.id,
                originalName: photo.file.name,
                file: compressedFile,
              });
            } catch (e) {
              firstError = firstError || e;
              throw e;
            }
          }
          producerDone = true;
        })();
        
        // === Workers: 업로드 (동시 N개) ===
        async function worker() {
          while (true) {
            if (firstError) return;
            
            if (uploadQueue.length === 0) {
              if (producerDone) return;  // 더 들어올 거 없음
              await sleep(50);            // Producer 대기
              continue;
            }
            
            const task = uploadQueue.shift();
            try {
              markUploading(task.photoId);
              const url = await uploadFile(task.file, pct => {
                updateProgress(task.photoId, pct);
              });
              urls[task.slotIdx] = {
                slot: task.slotIdx + 1,
                url: url,
                originalName: task.originalName,
              };
              markSuccess(task.photoId);
              uploadedCount++;
              updateBtnText();
            } catch (e) {
              firstError = firstError || e;
              throw e;
            }
          }
        }
        
        // Producer + Workers 동시 실행
        const workers = [];
        for (let w = 0; w < UPLOAD_CONCURRENCY; w++) {
          workers.push(worker());
        }
        await Promise.all([producer, ...workers]);
        
        // === 매니페스트 업로드 ===
        const manifest = {
          createdAt: new Date().toISOString(),
          photoCount: urls.length,
          photos: urls,
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const manifestFile = new File([manifestBlob], 'manifest.json', { type: 'application/json' });
        btn.textContent = "마지막 단계...";
        const manifestUrl = await uploadFile(manifestFile);
        
        const code = extractCode(manifestUrl);
        if (!code) throw new Error("코드 추출 실패");
        showResult(code);
      } catch (e) {
        console.error(e);
        showToast(`업로드 실패: ${e.message}`, 'error');
        btn.disabled = false;
        btn.textContent = "다시 시도";
      }
    }
    
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    /**
     * 이미지를 300KB 이하로 압축 (Canvas API).
     * 1. EXIF Orientation 적용 (브라우저가 알아서 처리)
     * 2. 긴 변이 1600px 넘으면 1600px로 다운스케일
     * 3. quality 단계적으로 낮춰가며 300KB 이하 만들기
     */
    async function compressImage(file) {
      const MAX_BYTES = 300 * 1024;
      const MAX_DIM = 1600;
      
      // 이미지를 Canvas에 그려서 압축
      const img = await loadImage(file);
      
      let { width, height } = img;
      const longSide = Math.max(width, height);
      if (longSide > MAX_DIM) {
        const scale = MAX_DIM / longSide;
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      // quality 단계적으로
      const qualities = [0.85, 0.75, 0.65, 0.55, 0.45, 0.35];
      let blob = null;
      for (const q of qualities) {
        blob = await canvasToBlob(canvas, 'image/jpeg', q);
        if (blob.size <= MAX_BYTES) break;
      }
      
      // 그래도 큰 경우 해상도 더 줄임
      while (blob.size > MAX_BYTES && Math.max(canvas.width, canvas.height) > 600) {
        canvas.width = Math.round(canvas.width * 0.85);
        canvas.height = Math.round(canvas.height * 0.85);
        const ctx2 = canvas.getContext('2d');
        ctx2.drawImage(img, 0, 0, canvas.width, canvas.height);
        blob = await canvasToBlob(canvas, 'image/jpeg', 0.7);
      }
      
      // Blob → File (원본 파일 이름 유지, 확장자만 jpg로)
      const baseName = file.name.replace(/\.[^.]+$/, '') || 'photo';
      return new File([blob], `${baseName}.jpg`, { type: 'image/jpeg' });
    }
    
    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('이미지 로드 실패'));
        };
        img.src = url;
      });
    }
    
    function canvasToBlob(canvas, type, quality) {
      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), type, quality);
      });
    }
    
    function markCompressing(id) {
      const card = document.getElementById(`card-${id}`);
      if (!card) return;
      card.classList.add('uploading');
    }
    
    function uploadFile(file, onProgress) {
      return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append('file', file);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://tmpfiles.org/api/v1/upload');
        if (onProgress) {
          xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) onProgress((e.loaded / e.total) * 100);
          });
        }
        xhr.onload = () => {
          if (xhr.status === 200) {
            try {
              const data = JSON.parse(xhr.responseText);
              if (data.status === 'success') resolve(data.data.url);
              else reject(new Error('서버 응답 오류'));
            } catch (e) { reject(e); }
          } else reject(new Error(`HTTP ${xhr.status}`));
        };
        xhr.onerror = () => reject(new Error('네트워크 오류'));
        xhr.send(formData);
      });
    }
    
    function extractCode(url) {
      const m = url.match(/tmpfiles\.org\/(\d+)\//);
      return m ? m[1] : null;
    }
    
    function markUploading(id) {
      const card = document.getElementById(`card-${id}`);
      if (!card) return;
      card.classList.add('uploading');
      if (!card.querySelector('.progress')) {
        const bar = document.createElement('div');
        bar.className = 'progress';
        bar.innerHTML = `<div class="progress-bar" id="bar-${id}"></div>`;
        card.appendChild(bar);
      }
    }
    
    function updateProgress(id, pct) {
      const bar = document.getElementById(`bar-${id}`);
      if (bar) bar.style.width = pct + '%';
    }
    
    function markSuccess(id) {
      const card = document.getElementById(`card-${id}`);
      if (!card) return;
      card.classList.remove('uploading');
      card.classList.add('success');
      const bar = card.querySelector('.progress');
      if (bar) bar.remove();
      if (!card.querySelector('.status')) {
        const s = document.createElement('div');
        s.className = 'status';
        s.textContent = '✓';
        card.appendChild(s);
      }
    }
    
    function showResult(code) {
      document.getElementById('code-display').textContent = code;
      document.getElementById('result').classList.add('show');
      document.getElementById('submit-btn').style.display = 'none';
      document.getElementById('result').scrollIntoView({behavior: 'smooth'});
      showToast(`${photos.length}장 업로드 완료!`, 'success');
    }
    
    function copyCode() {
      const code = document.getElementById('code-display').textContent;
      const tmp = document.createElement('input');
      tmp.value = code;
      document.body.appendChild(tmp);
      tmp.select();
      tmp.setSelectionRange(0, 99999);
      try {
        document.execCommand('copy');
        if (navigator.clipboard) navigator.clipboard.writeText(code);
        showToast('코드가 복사되었습니다', 'success');
      } catch (e) {
        showToast('복사 실패 - 직접 입력하세요', 'error');
      }
      document.body.removeChild(tmp);
    }
    
    let toastTimer = null;
    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        t.className = 'toast ' + type;
      }, 2500);
    }
  </script>
</body>
</html>
